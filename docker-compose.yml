version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: bike-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root@2024
      MYSQL_DATABASE: bike_management
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot@2024"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: bike-backend
    restart: always
    ports:
      - "9182:9182"
    environment:
      - NODE_ENV=production
      - PORT=9182
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_USER=root
      - DB_PASSWORD=root@2024
      - DB_NAME=bike_management
      - JWT_SECRET=bike_management_secret_key_2024
      - JWT_EXPIRES_IN=24h
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: bike-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    volumes:
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf

volumes:
  mysql-data:
